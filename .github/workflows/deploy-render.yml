name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy traders-api (backend)
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_API"
        env:
          RENDER_DEPLOY_HOOK_API: ${{ secrets.RENDER_DEPLOY_HOOK_API }}

      - name: Deploy traders-web (frontend)
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_WEB"
        env:
          RENDER_DEPLOY_HOOK_WEB: ${{ secrets.RENDER_DEPLOY_HOOK_WEB }}
