services:
  - type: web
    name: traders-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run start:prod
    healthCheckPath: /api/v1/leaderboard
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: NOWPAYMENTS_API_KEY
        sync: false
      - key: NOWPAYMENTS_PUBLIC_KEY
        sync: false
      - key: NOWPAYMENTS_IPN_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: SIGNAL_HUB_URL
        value: https://signalhub-10zp.onrender.com
      # Set on traders-api only — frontend does not read this key
      - key: SIGNAL_HUB_PROVIDER_KEY
        sync: false
      - key: SIGNAL_HUB_PROVIDER_NAME
        value: TraderRank Pro
      - key: SIGNAL_HUB_ORDER_TYPE
        value: limit

  - type: web
    name: traders-web
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        value: https://traders-c53s.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://traders-c53s.onrender.com/api/v1
