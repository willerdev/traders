services:
  - type: web
    name: traders-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run prisma:push && npm run start:prod
    healthCheckPath: /api/v1/leaderboard
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://thetradeguard.com
        sync: false
      - key: PUBLIC_APP_URL
        value: https://thetradeguard.com
      - key: API_PUBLIC_URL
        value: https://thetradeguard.com
        sync: false
      # NOWPayments keys must be on this backend service (traders-api), not the frontend web service.
      - key: NOWPAYMENTS_API_KEY
        sync: false
      - key: NOWPAYMENTS_PUBLIC_KEY
        sync: false
      - key: NOWPAYMENTS_IPN_SECRET
        sync: false
      - key: NOWPAYMENTS_PAYOUT_EMAIL
        sync: false
      - key: NOWPAYMENTS_PAYOUT_PASSWORD
        sync: false
      - key: FLW_CLIENT_ID
        sync: false
      - key: FLW_CLIENT_SECRET
        sync: false
      - key: FLW_ENCRYPTION_KEY
        sync: false
      - key: FLW_WEBHOOK_SECRET
        sync: false
      - key: FLW_API_URL
        value: https://f4bexperience.flutterwave.com
      - key: FLW_ENV
        value: live
      - key: FLW_MOMO_CURRENCY
        value: UGX
      - key: FLW_MOMO_COUNTRY_CODE
        value: "256"
      - key: FLW_USD_TO_LOCAL_RATE
        value: "3800"
      - key: FLW_MIN_DEPOSIT_USD
        value: "3"
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: SIGNAL_HUB_URL
        value: https://signalhub-10zp.onrender.com
      # Set on traders-api only — frontend does not read this key
      - key: SIGNAL_HUB_PROVIDER_KEY
        sync: false
      - key: SIGNAL_HUB_PROVIDER_NAME
        value: TraderRank Pro
      - key: SIGNAL_HUB_ORDER_TYPE
        value: limit
      - key: METAAPI_TOKEN
        sync: false
      - key: METAAPI_DEFAULT_ACCOUNT_ID
        sync: false
      - key: METAAPI_COPY_ACCOUNT_ID
        sync: false
      - key: METAAPI_TRADE_VOLUME
        value: "0.01"
      - key: TRADE_OUTCOME_WEBHOOK_SECRET
        sync: false
      - key: SETUP_FEED_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: TraderRank Pro <notifications@thetradeguard.com>
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_REGION
        value: us-east-1
      - key: S3_PUBLIC_URL
        sync: false
      - key: SEED_DEMO_LEADERBOARD
        value: "false"
      - key: ABUSE_HUNTER_ENABLED
        value: "true"

  - type: web
    name: traders-web
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        value: https://traders-c53s.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://traders-c53s.onrender.com/api/v1
      - key: NEXT_PUBLIC_MOMO_ENABLED
        value: "true"
      - key: NEXT_PUBLIC_MOMO_CURRENCY
        value: UGX
      - key: NEXT_PUBLIC_MOMO_COUNTRY_CODE
        value: "256"
      - key: NEXT_PUBLIC_MOMO_USD_RATE
        value: "3800"
